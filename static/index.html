<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Portfolio</title>

    <!-- Tailwind CSS: lo cargamos directamente desde internet, sin instalación -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen">

    <!-- Canvas del fondo estrellado: fixed lo pone fijo detrás de todo -->
    <canvas id="stars" class="fixed inset-0 -z-10"></canvas>

    <!-- NAVBAR: siempre visible, nunca cambia -->
<nav class="flex items-center justify-between p-6 border-b border-white/10">

    <div class="flex gap-6">
        <a href="#home"     class="hover:text-indigo-400 transition-colors">Inicio</a>
        <a href="#about"    class="hover:text-indigo-400 transition-colors">Sobre mí</a>
        <a href="#services" class="hover:text-indigo-400 transition-colors">Servicios</a>
        <a href="#gallery"  class="hover:text-indigo-400 transition-colors">Galería</a>
        <a href="#contact"  class="hover:text-indigo-400 transition-colors">Contacto</a>
    </div>

    <!-- Este div se actualizará dinámicamente según si hay sesión o no -->
    <div id="nav-auth">
        <a href="#auth"
           class="px-4 py-2 border border-indigo-500 rounded-full text-indigo-400
                  text-sm hover:bg-indigo-500/10 transition-colors">
            Iniciar sesión
        </a>
    </div>

</nav>

    <!-- AQUÍ es donde el router meterá cada vista -->
    <!-- Este div empieza vacío. JavaScript lo rellenará -->
    <main id="app" class="p-8">
        Cargando...
    </main>

    <!-- Los scripts van al final, en este orden -->
     <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/supabase-client.js"></script>
    <script src="/js/views/home.js"></script>
    <script src="/js/views/about.js"></script>
    <script src="/js/views/services.js"></script>
    <script src="/js/views/gallery.js"></script>
    <script src="/js/views/contact.js"></script>
    <script src="/js/views/auth.js"></script>
    <script src="/js/router.js"></script>
    <script src="/js/app.js"></script>

</body>
</html>
