<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ismael Cruz Fernandez</title>
    <link rel="stylesheet" href="/css/style.css" />
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Ismael Cruz" />
    <link rel="apple-touch-icon" href="/images/icon-192.png" />
  </head>
  <body class="bg-gray-950 text-white min-h-screen">
    <canvas id="stars" class="fixed inset-0 -z-10"></canvas>
    <!-- Fondo aurora -->
    <div
      id="aurora-bg"
      class="fixed inset-0 overflow-hidden pointer-events-none z-0"
    >
      <div class="parallax-layer" data-speed="0.3">
        <div class="blob blob-1"></div>
      </div>
      <div class="parallax-layer" data-speed="-0.2">
        <div class="blob blob-2"></div>
      </div>
      <div class="parallax-layer" data-speed="0.15">
        <div class="blob blob-3"></div>
      </div>
      <div class="parallax-layer" data-speed="-0.25">
        <div class="blob blob-4"></div>
      </div>
    </div>
    <nav
      class="flex items-center justify-between p-4 md:p-6 border-b border-white/10 relative z-50"
    >
      <!-- Izquierda: links en desktop / nombre en móvil -->
      <div class="hidden md:flex gap-6">
        <a href="#home" class="hover:text-indigo-400 transition-colors"
          >Inicio</a
        >
        <a href="#works" class="hover:text-indigo-400 transition-colors"
          >Trabajos</a
        >
        <a href="#gallery" class="hover:text-indigo-400 transition-colors"
          >Galería</a
        >
        <a href="#chat" class="hover:text-indigo-400 transition-colors">Chat</a>
        <a href="#contact" class="hover:text-indigo-400 transition-colors"
          >Contacto</a
        >
      </div>
      <span class="md:hidden font-bold text-white">Ismael Cruz</span>

      <!-- Derecha: auth + hamburguesa -->
      <div class="flex items-center gap-3">
        <!-- Desktop: email + Salir (o Iniciar sesión) -->
        <div id="nav-auth" class="hidden md:block">
          <a
            href="#auth"
            class="px-4 py-2 border border-indigo-500 rounded-full text-indigo-400 text-sm hover:bg-indigo-500/10 transition-colors"
          >
            Iniciar sesión
          </a>
        </div>

        <!-- Móvil: avatar con inicial (solo cuando hay sesión) -->
        <div id="nav-auth-mobile" class="md:hidden"></div>

        <!-- Hamburguesa: solo en móvil -->
        <button
          id="hamburger-btn"
          class="md:hidden flex flex-col justify-center gap-1.5 w-8 h-8 focus:outline-none"
        >
          <span
            class="w-6 h-0.5 bg-white rounded transition-all duration-300"
          ></span>
          <span
            class="w-6 h-0.5 bg-white rounded transition-all duration-300"
          ></span>
          <span
            class="w-6 h-0.5 bg-white rounded transition-all duration-300"
          ></span>
        </button>
      </div>

      <!-- Menú desplegable móvil -->
      <div
        id="mobile-menu"
        class="hidden absolute top-full left-0 right-0 bg-[#06060f] border-b border-white/10 p-6 flex flex-col gap-5"
      >
        <a
          href="#home"
          class="mobile-link text-lg hover:text-indigo-400 transition-colors"
          >Inicio</a
        >
        <a
          href="#works"
          class="mobile-link text-lg hover:text-indigo-400 transition-colors"
          >Trabajos</a
        >
        <a
          href="#gallery"
          class="mobile-link text-lg hover:text-indigo-400 transition-colors"
          >Galería</a
        >
        <a
          href="#chat"
          class="mobile-link text-lg hover:text-indigo-400 transition-colors"
          >Chat</a
        >
        <a
          href="#contact"
          class="mobile-link text-lg hover:text-indigo-400 transition-colors"
          >Contacto</a
        >
        <!-- Auth en el menú móvil: se actualiza dinámicamente -->
        <div id="mobile-menu-auth" class="pt-4 border-t border-white/10">
          <a
            href="#auth"
            class="mobile-link text-lg hover:text-indigo-400 transition-colors"
          >
            Iniciar sesión
          </a>
        </div>
      </div>
    </nav>
